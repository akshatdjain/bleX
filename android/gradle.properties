# Project-wide Gradle settings

# Use AndroidX libraries (the modern replacement for old Support Libraries)
android.useAndroidX=true

# Each module only sees its own R class (better build performance)
android.nonTransitiveRClass=true

# Give Gradle's JVM more memory for faster builds
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Enable Gradle build caching for faster rebuilds
org.gradle.caching=true
